ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) for code review, debugging, and architectural
  discussion during development of the data science pipeline. Claude assisted
  with module signature verification, field name corrections against the
  candidate schema, and pipeline orchestration in run.py. No candidate data
  was fed to any LLM. All ranking logic, scoring weights, and feature
  engineering decisions were made by the team.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  HireIQ is a five-signal hybrid ranking system built for the Redrob Senior
  AI Engineer JD. Pipeline: (1) Semantic retrieval using sentence-transformers
  (all-MiniLM-L6-v2) with cosine similarity to retrieve top-500 candidates
  from 100K pool. (2) Feature extraction across five dimensions — semantic
  score (40%), skill overlap with JD keywords including synonym normalization
  and partial credit (25%), experience score tuned to JD sweet spot of 5-9
  years (15%), behavioral engagement signals from redrob_signals including
  recruiter response rate, GitHub activity, interview completion, and
  open-to-work flag (10%), title relevance with fuzzy keyword matching against
  20+ engineering title variants (10%). (3) Hybrid weighted ranking to produce
  top-100 with final scores. (4) Rule-based reasoning generator producing
  one-line human-readable explanations per candidate. Designed to penalize
  keyword stuffers (title score), ghost candidates (behavior score), and
  consulting-background candidates via semantic context understanding.
  Runtime: ~12 min first run (embedding cache), ~2 min subsequent runs.

