# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude (Anthropic)"

ai_usage_summary: |
  Used Claude (Anthropic) for code review, debugging, and architectural
  discussion during development of the data science pipeline. Claude assisted
  with module signature verification, field name corrections against the
  candidate schema, and pipeline orchestration review. No candidate data was
  shared with any LLM. All scoring weights, feature engineering decisions,
  and ranking logic were made by the team.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  HireIQ is a six-signal hybrid ranking system built for the Redrob Senior
  AI Engineer JD.

  Signals and weights:
    - Semantic similarity      35%  (all-MiniLM-L6-v2 cosine similarity)
    - Skill overlap            27%  (JD keyword match + synonym normalization)
    - Experience               15%  (tuned to 5–9 year sweet spot)
    - Behavioral engagement    10%  (recruiter response, GitHub, interviews)
    - Title relevance           8%  (fuzzy match, 20+ engineering title variants)
    - Profile completeness      5%  (rewards fully-filled profiles)

  Scoring formula:
    final_score = base_score × (1 − honeypot_penalty)

  Honeypot / fraud detection scans every candidate for: unrealistic experience,
  excessive skill-padding, senior-title-with-zero-activity mismatches, and
  abnormal behavioral signals. Flagged profiles receive a multiplicative penalty
  rather than outright rejection to avoid false positives.

  Pipeline:
    run.py → semantic retrieval (top-500) → feature extraction →
    honeypot detection → hybrid ranking (top-100) → reasoning generation →
    submission.csv

  Runtime: ~2 hours first run (embedding cache), ~25–30 seconds subsequently.

